version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shop-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: shop_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - shop-network

  postgres:
    image: postgres:15
    container_name: shop-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shop_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - shop-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shop-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DB_TYPE=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=shop_db
      - SECRET_KEY=your-secret-key-here-change-in-production
    depends_on:
      - mysql
    networks:
      - shop-network

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: shop-frontend-admin
    ports:
      - "3000:3000"
    volumes:
      - ./frontend-admin:/app
    environment:
      - VITE_API_BASE_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    networks:
      - shop-network

  frontend-shop:
    build:
      context: ./frontend-shop
      dockerfile: Dockerfile
    container_name: shop-frontend-shop
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-shop:/app
    environment:
      - VITE_API_BASE_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    networks:
      - shop-network

volumes:
  mysql-data:
  postgres-data:

networks:
  shop-network:
    driver: bridge
